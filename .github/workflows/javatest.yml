# This workflow will import Postman Collections data into apifox repository after jar file excute

name: postman collection integration

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - name: Import Github Files
      uses: actions/checkout@v3
    - name: Set up Jdk 21
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Start Run integration
      run: |
        java -jar Test01.jar

